name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: styler
          needs: lint

      - name: Style R code
        run: styler::style_pkg()
        shell: Rscript {0}

      - name: Style C++ code
        run: clang-format --style=Google -i src/*.cpp

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-format R and C++ code"
